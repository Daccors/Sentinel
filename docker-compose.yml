services:
  elasticsearch:
    image: elasticsearch:9.3.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports : 
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
  
  kibana:
    image: kibana:9.3.0
    ports : 
      - "5601:5601"
    depends_on:
      - elasticsearch

  sentinel:
    build: .
    depends_on:
      - elasticsearch

volumes:
  elasticsearch_data: