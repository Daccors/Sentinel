apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-consumer
  namespace: sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentinel-consumer
  template:
    metadata:
      labels:
        app: sentinel-consumer
    spec:
      containers:
        - name: sentinel-consumer
          image: sentinel:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: sentinel-config